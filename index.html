<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#070b12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="QAQC Links" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>Quality Daily Report Links</title>
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="assets/icon-192.png" />
    <link rel="stylesheet" href="assets/vendor/animate.min.css" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell" aria-labelledby="page-title">
      <section class="hero" aria-label="Quality daily report form links">
        <header class="brand-bar">
          <img class="brand-logo" src="assets/ct-logo.png" alt="CT logo" />
          <div class="title-group">
            <p class="eyebrow">Form Host</p>
            <h1 id="page-title">Quality Daily Report Links</h1>
          </div>
        </header>

        <nav class="button-stack" aria-label="Report form links">
          <a
            class="form-link form-link--linde animate__animated animate__backInDown"
            href="https://www.google.com"
            data-form-link
            style="animation-delay: 0.05s"
          >
            <span>Linde QA</span>
          </a>
          <a
            class="form-link form-link--kiewit animate__animated animate__backInDown"
            href="https://www.google.com"
            data-form-link
            style="animation-delay: 0.16s"
          >
            <span>Kiewit QA</span>
          </a>
          <a
            class="form-link form-link--kiewit animate__animated animate__backInDown"
            href="https://www.google.com"
            data-form-link
            style="animation-delay: 0.27s"
          >
            <span>Kiewit QC</span>
          </a>
        </nav>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
